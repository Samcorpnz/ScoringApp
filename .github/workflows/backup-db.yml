name: Backup database

# SA-57: free-tier insurance against Neon's PITR cap (free plan only keeps
# 6 hours / 1GB of change history — see docs/runbooks/database-backups.md).
# This is a DIY supplement, not a replacement for upgrading to a paid plan
# with longer retention once there are paying customers to justify the cost.

on:
  schedule:
    - cron: "0 16 * * *" # 04:00 NZST / 16:00 UTC — low-traffic window
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backup:
    name: Dump Postgres and upload to R2
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install postgresql-client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl ca-certificates gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-18

      - name: Dump database
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          echo "DUMP_FILE=backup-${STAMP}.dump" >> "$GITHUB_ENV"
          pg_dump --no-owner --no-acl --format=custom --file="backup-${STAMP}.dump" "$DATABASE_URL"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload to R2
        run: |
          set -euo pipefail
          aws s3 cp "$DUMP_FILE" "s3://${R2_BUCKET}/db-backups/${DUMP_FILE}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

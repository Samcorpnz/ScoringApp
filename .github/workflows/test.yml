name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call: {}

permissions:
  contents: read

jobs:
  test-relay:
    name: Relay tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefix ..
      - run: npm audit --omit=dev --audit-level=high --prefix ..
      - run: npm run build --workspace=@scorehub/db --prefix ..
      - run: npm test -- --ci

  test-bridge:
    name: Bridge (parser) tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bridge/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm test -- --ci

  test-frontend:
    name: Frontend build, lint, typecheck, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefix ..
      - run: npm audit --omit=dev --audit-level=high --prefix ..
      - run: npm run build --workspace=@scorehub/db --prefix ..
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          AUTH_SECRET: ci-placeholder-secret

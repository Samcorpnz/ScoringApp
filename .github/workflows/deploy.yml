name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy-relay:
    name: Deploy relay (Railway)
    needs: test
    runs-on: ubuntu-latest
    # Requires manual approval via the "production" GitHub Environment's
    # required reviewers (configure in repo Settings → Environments) before
    # this job is allowed to run, even though it's triggered automatically
    # on every push to main (SA-12).
    environment: production
    steps:
      - uses: actions/checkout@v7
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy relay to Railway
        run: railway up --service ScoringApp --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Deploy frontend (Vercel)
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy frontend to Vercel
        working-directory: frontend
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

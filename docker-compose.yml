# ─── ScoreHub — local Docker environment ───────────────────────────────────
#
# Usage:
#   1. cp .env.example .env   # set AUTH_SECRET, NEXTAUTH_SECRET
#   2. docker compose up --build
#
# Then open:
#   http://localhost:3000          — frontend (signup → dashboard → control panel)
#   http://localhost:4000          — relay API
#   http://localhost:4000/state    — live state JSON
#
# This stack stands in for production's managed services so a new engineer
# can run everything locally without a Neon/Upstash account:
#   postgres (local)  ↔ Neon Postgres in production
#   redis (local)     ↔ Upstash Redis in production
#   relay/frontend    ↔ same images deployed to Fly.io / Vercel
# Logo/sound uploads fall back to local disk (R2 unset) — fine for local dev.
#
# Bridge (serial reader) runs NATIVELY — serial ports are difficult to pass
# into Docker on Windows and Mac. Run it separately:
#   cd bridge && npm install && npm run dev
# ──────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scorehub
      POSTGRES_PASSWORD: scorehub
      POSTGRES_DB: scorehub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scorehub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  relay:
    build:
      context: .
      dockerfile: relay/Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://scorehub:scorehub@postgres:5432/scorehub}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env — must match the frontend's AUTH_SECRET}
      # Defaults to the local redis service above; override to point at
      # real Upstash for production (SA-62).
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      # Logos persist across container restarts
      - logos:/app/relay/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_RELAY_URL: ${NEXT_PUBLIC_RELAY_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://scorehub:scorehub@postgres:5432/scorehub}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env — must match the relay's AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      relay:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  logos:

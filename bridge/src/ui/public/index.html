<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard Bridge</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base:      #07090F;
    --bg-surface:   #0E1117;
    --bg-elevated:  #161B25;
    --border:       #1E2433;
    --text-primary: #E8EAF0;
    --text-secondary:#8B95A8;
    --text-dim:     #4B5568;
    --accent:       #00C8FF;
    --success:      #22C55E;
    --warn:         #F59E0B;
    --danger:       #EF4444;
    --data-color:   #A78BFA;
    --relay-color:  #34D399;
    --info-color:   #60A5FA;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header .logo { font-weight: 900; font-size: 15px; letter-spacing: -0.5px; }
  header .logo span { color: var(--accent); }
  header .badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--bg-elevated);
    color: var(--text-dim);
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── Left panel (config) ── */
  .panel-left {
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .panel-section:last-child { border-bottom: none; flex: 1; overflow-y: auto; }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* Status row */
  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.running  { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .status-dot.connecting { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: pulse 1s infinite; }
  .status-dot.error    { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  .status-dot.stopped  { background: var(--text-dim); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .status-label { font-size: 13px; font-weight: 600; }
  .score-display {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
    min-height: 18px;
  }
  .error-msg { font-size: 12px; color: var(--danger); margin-top: 6px; min-height: 16px; }
  .relay-badge {
    display: none;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--danger);
    border: 1px solid var(--danger);
    border-radius: 4px;
    padding: 2px 6px;
    margin-top: 6px;
  }
  .relay-badge.show { display: inline-block; animation: pulse 1.2s infinite; }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  button {
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    padding: 8px 16px;
    transition: opacity 0.15s, background 0.15s;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-start {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    flex: 1;
  }
  .btn-start:hover:not(:disabled) { opacity: 0.85; }

  .btn-stop {
    background: transparent;
    color: var(--danger);
    border-color: var(--danger);
  }
  .btn-stop:hover:not(:disabled) { background: #EF444418; }

  .btn-ghost {
    background: var(--bg-elevated);
    color: var(--text-secondary);
  }
  .btn-ghost:hover:not(:disabled) { background: var(--border); }

  /* Form fields */
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 5px;
  }
  input, select {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-dim); }
  select option { background: var(--bg-elevated); }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .source-fields { display: none; }
  .source-fields.active { display: block; }

  .hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .port-refresh { display: flex; gap: 6px; }
  .port-refresh select { flex: 1; }
  .port-refresh button { padding: 8px 10px; flex-shrink: 0; font-size: 11px; }

  /* ── Right panel (log) ── */
  .panel-right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-base);
  }

  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 44px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .log-header .title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .log-controls { display: flex; gap: 8px; align-items: center; }

  .toggle-pill {
    display: flex;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .toggle-pill button {
    border: none;
    border-radius: 0;
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: transparent;
    color: var(--text-dim);
  }
  .toggle-pill button.active {
    background: var(--bg-surface);
    color: var(--text-primary);
  }
  .toggle-pill button + button { border-left: 1px solid var(--border); }

  .log-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 12px;
  }

  .log-entry {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 3px 16px;
    border-bottom: 1px solid transparent;
    line-height: 1.5;
  }
  .log-entry:hover { background: var(--bg-elevated); }

  .log-ts {
    color: var(--text-dim);
    font-size: 10px;
    flex-shrink: 0;
    width: 72px;
  }
  .log-level {
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    width: 40px;
    text-transform: uppercase;
  }
  .log-msg { color: var(--text-primary); word-break: break-word; }

  .level-info  .log-level { color: var(--info-color); }
  .level-warn  .log-level { color: var(--warn); }
  .level-error .log-level { color: var(--danger); }
  .level-data  .log-level { color: var(--data-color); }
  .level-relay .log-level { color: var(--relay-color); }

  .level-info  .log-msg { color: var(--text-secondary); }
  .level-relay .log-msg { color: var(--relay-color); opacity: 0.8; }
  .level-data  .log-msg { color: var(--data-color); }
  .level-warn  .log-msg { color: var(--warn); }
  .level-error .log-msg { color: var(--danger); }

  .log-empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<header>
  <div class="logo">Score<span>board</span> Bridge</div>
  <div class="badge">Admin</div>
</header>

<div class="layout">

  <!-- ── Left: Config panel ── -->
  <div class="panel-left">

    <!-- Status -->
    <div class="panel-section">
      <div class="section-title">Status</div>
      <div class="status-row">
        <div class="status-dot stopped" id="statusDot"></div>
        <div class="status-label" id="statusLabel">Stopped</div>
      </div>
      <div class="score-display" id="scoreDisplay"></div>
      <div class="error-msg" id="errorMsg"></div>
      <div class="relay-badge" id="relayBadge">RELAY UNREACHABLE — SWITCH TO MANUAL CONTROL</div>
      <div class="btn-row">
        <button class="btn-start" id="btnStart" onclick="startBridge()">Start</button>
        <button class="btn-stop" id="btnStop" onclick="stopBridge()" disabled>Stop</button>
      </div>
    </div>

    <!-- Source selector -->
    <div class="panel-section" style="overflow-y: auto; flex: 1;">
      <div class="section-title">Configuration</div>

      <div class="field">
        <label>Relay URL</label>
        <input type="text" id="relayUrl" placeholder="http://localhost:4000">
      </div>
      <div class="field">
        <label>Bridge Secret</label>
        <input type="password" id="bridgeSecret" placeholder="changeme">
      </div>

      <div class="field" style="margin-top: 18px;">
        <label>Data Source</label>
        <select id="sourceType" onchange="onSourceChange()">
          <option value="saturn">Saturn / Vega Serial</option>
          <option value="cd-json">ChampionData — JSON Feed</option>
          <option value="cd-scrape">ChampionData — Web Scraper</option>
        </select>
      </div>

      <!-- Saturn fields -->
      <div class="source-fields active" id="fields-saturn">
        <div class="field">
          <label>Serial Port</label>
          <div class="port-refresh">
            <select id="serialPort">
              <option value="">Select port…</option>
            </select>
            <button class="btn-ghost" onclick="refreshPorts()" title="Refresh ports">↺</button>
          </div>
        </div>
        <div class="field">
          <label>Baud Rate</label>
          <select id="baudRate">
            <option value="9600">9600</option>
            <option value="19200">19200</option>
            <option value="38400">38400</option>
            <option value="57600">57600</option>
            <option value="115200">115200</option>
          </select>
        </div>
      </div>

      <!-- CD JSON fields -->
      <div class="source-fields" id="fields-cd-json">
        <div class="field">
          <label>Feed URL</label>
          <input type="text" id="cdUrl" placeholder="https://api.example.com/match?id=1234">
        </div>
        <div class="field-row">
          <div class="field">
            <label>Username</label>
            <input type="text" id="cdUsername" placeholder="optional">
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="cdPassword" placeholder="optional">
          </div>
        </div>
        <div class="field">
          <label>Poll Interval (ms)</label>
          <input type="number" id="cdPollMs" placeholder="2000" min="500" max="30000" step="500">
          <div class="hint">How often to fetch the feed (default 2000ms)</div>
        </div>
      </div>

      <!-- CD Scrape fields -->
      <div class="source-fields" id="fields-cd-scrape">
        <div class="field">
          <label>Page URL</label>
          <input type="text" id="cdScrapeUrl" placeholder="https://mc.championdata.com/…?competitionid=…&matchid=…">
          <div class="hint">The full ChampionData match page URL</div>
        </div>
        <div class="field">
          <label>Poll Interval (ms)</label>
          <input type="number" id="cdScrapePollMs" placeholder="500" min="500" max="10000" step="500">
          <div class="hint">How often to reload the page (default 500ms)</div>
        </div>
      </div>

      <div class="btn-row" style="margin-top: 18px;">
        <button class="btn-ghost" style="flex:1;" onclick="saveConfig()">Save Config</button>
      </div>
    </div>

  </div>

  <!-- ── Right: Log panel ── -->
  <div class="panel-right">
    <div class="log-header">
      <div class="title">Live Log</div>
      <div class="log-controls">
        <div class="toggle-pill" id="filterPill">
          <button class="active" data-filter="all" onclick="setFilter('all',this)">All</button>
          <button data-filter="data" onclick="setFilter('data',this)">Data</button>
          <button data-filter="relay" onclick="setFilter('relay',this)">Relay</button>
          <button data-filter="warn,error" onclick="setFilter('warn,error',this)">Errors</button>
        </div>
        <button class="btn-ghost" style="padding:4px 10px; font-size:11px;" onclick="clearLog()">Clear</button>
        <button class="btn-ghost" id="autoScrollBtn" style="padding:4px 10px; font-size:11px;" onclick="toggleAutoScroll()">Auto ↓</button>
      </div>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-empty" id="logEmpty">No log entries yet — start the bridge to see data flowing</div>
    </div>
  </div>

</div>

<script>
  let config = {};
  let currentFilter = 'all';
  let autoScroll = true;
  let logEntries = [];
  const MAX_LOG = 1000;

  // ── Init ────────────────────────────────────────────────────────────────────

  async function init() {
    await loadConfig();
    await refreshPorts();
    connectSSE();
    pollStatus();
    setInterval(pollStatus, 3000);
  }

  // ── Config ──────────────────────────────────────────────────────────────────

  async function loadConfig() {
    const res = await fetch('/api/config');
    config = await res.json();
    applyConfigToForm(config);
  }

  function applyConfigToForm(c) {
    setVal('relayUrl', c.relayUrl || '');
    setVal('bridgeSecret', c.bridgeSecret || '');
    setVal('sourceType', c.source || 'saturn');
    setVal('serialPort', c.serialPort || '');
    setVal('baudRate', String(c.baudRate || 9600));
    setVal('cdUrl', c.cdUrl || '');
    setVal('cdUsername', c.cdUsername || '');
    setVal('cdPassword', c.cdPassword || '');
    setVal('cdPollMs', String(c.cdPollMs || 2000));
    setVal('cdScrapeUrl', c.cdScrapeUrl || '');
    setVal('cdScrapePollMs', String(c.cdScrapePollMs || 500));
    onSourceChange();
  }

  function collectConfig() {
    return {
      relayUrl: getVal('relayUrl'),
      bridgeSecret: getVal('bridgeSecret'),
      source: getVal('sourceType'),
      serialPort: getVal('serialPort'),
      baudRate: Number(getVal('baudRate')),
      cdUrl: getVal('cdUrl'),
      cdUsername: getVal('cdUsername'),
      cdPassword: getVal('cdPassword'),
      cdPollMs: Number(getVal('cdPollMs') || 2000),
      cdScrapeUrl: getVal('cdScrapeUrl'),
      cdScrapePollMs: Number(getVal('cdScrapePollMs') || 500),
    };
  }

  async function saveConfig() {
    const patch = collectConfig();
    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(patch),
    });
    const data = await res.json();
    config = data.config;
    addLogEntry({ ts: Date.now(), level: 'info', msg: 'Config saved' });
  }

  // ── Source selector ─────────────────────────────────────────────────────────

  function onSourceChange() {
    const source = getVal('sourceType');
    document.querySelectorAll('.source-fields').forEach(el => el.classList.remove('active'));
    const target = document.getElementById(`fields-${source}`);
    if (target) target.classList.add('active');
  }

  // ── Serial ports ─────────────────────────────────────────────────────────────

  async function refreshPorts() {
    const res = await fetch('/api/ports');
    const data = await res.json();
    const sel = document.getElementById('serialPort');
    const current = sel.value;
    sel.innerHTML = '<option value="">Select port…</option>';
    (data.ports || []).forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      sel.appendChild(opt);
    });
    if (current) sel.value = current;
  }

  // ── Bridge control ──────────────────────────────────────────────────────────

  async function startBridge() {
    await saveConfig();
    setButtonsLoading(true);
    const res = await fetch('/api/start', { method: 'POST' });
    const data = await res.json();
    updateStatus(data);
    setButtonsLoading(false);
  }

  async function stopBridge() {
    setButtonsLoading(true);
    const res = await fetch('/api/stop', { method: 'POST' });
    const data = await res.json();
    updateStatus(data);
    setButtonsLoading(false);
  }

  // ── Status polling ──────────────────────────────────────────────────────────

  async function pollStatus() {
    try {
      const res = await fetch('/api/status');
      const data = await res.json();
      updateStatus(data);
    } catch {}
  }

  function updateStatus(data) {
    const dot = document.getElementById('statusDot');
    const label = document.getElementById('statusLabel');
    const score = document.getElementById('scoreDisplay');
    const err = document.getElementById('errorMsg');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');

    const status = data.status || 'stopped';
    dot.className = `status-dot ${status}`;

    const labels = { running: 'Running', connecting: 'Connecting…', stopped: 'Stopped', error: 'Error' };
    label.textContent = labels[status] || status;

    if (data.state && (data.state.home !== undefined)) {
      const s = data.state;
      const parts = [];
      if (s.matchName) parts.push(s.matchName);
      else if (s.home !== undefined) parts.push(`Score: ${s.home} – ${s.visitor}`);
      if (s.period) parts.push(`Period ${s.period}`);
      if (s.netballStats) parts.push('📊 Stats');
      score.textContent = parts.join(' · ');
    } else {
      score.textContent = '';
    }

    err.textContent = data.lastError || '';

    const relayBadge = document.getElementById('relayBadge');
    relayBadge.classList.toggle('show', !!(data.relay && data.relay.outageAlerted));

    const isRunning = status === 'running' || status === 'connecting';
    btnStart.disabled = isRunning;
    btnStop.disabled = !isRunning;
    btnStart.textContent = status === 'connecting' ? 'Starting…' : 'Start';
  }

  function setButtonsLoading(loading) {
    document.getElementById('btnStart').disabled = loading;
    document.getElementById('btnStop').disabled = loading;
  }

  // ── SSE log stream ──────────────────────────────────────────────────────────

  function connectSSE() {
    const es = new EventSource('/api/logs');
    es.onmessage = (e) => {
      try {
        const entry = JSON.parse(e.data);
        addLogEntry(entry);
      } catch {}
    };
    es.onerror = () => {
      setTimeout(connectSSE, 3000);
    };
  }

  function addLogEntry(entry) {
    logEntries.push(entry);
    if (logEntries.length > MAX_LOG) logEntries.shift();
    renderEntry(entry);
    if (autoScroll) {
      const body = document.getElementById('logBody');
      body.scrollTop = body.scrollHeight;
    }
  }

  function renderEntry(entry) {
    const empty = document.getElementById('logEmpty');
    if (empty) empty.remove();

    if (!matchesFilter(entry.level)) return;

    const body = document.getElementById('logBody');
    const div = document.createElement('div');
    div.className = `log-entry level-${entry.level}`;
    div.dataset.level = entry.level;

    const ts = new Date(entry.ts);
    const timeStr = ts.toTimeString().slice(0, 8);

    div.innerHTML = `
      <span class="log-ts">${timeStr}</span>
      <span class="log-level">${entry.level}</span>
      <span class="log-msg">${escHtml(entry.msg)}</span>
    `;
    body.appendChild(div);

    // Keep DOM lean
    const entries = body.querySelectorAll('.log-entry');
    if (entries.length > MAX_LOG) entries[0].remove();
  }

  // ── Filtering ────────────────────────────────────────────────────────────────

  function matchesFilter(level) {
    if (currentFilter === 'all') return true;
    return currentFilter.split(',').includes(level);
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('#filterPill button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    rebuildLog();
  }

  function rebuildLog() {
    const body = document.getElementById('logBody');
    body.innerHTML = '';
    const visible = logEntries.filter(e => matchesFilter(e.level));
    if (visible.length === 0) {
      body.innerHTML = '<div class="log-empty">No entries match this filter</div>';
      return;
    }
    visible.forEach(renderEntry);
    if (autoScroll) body.scrollTop = body.scrollHeight;
  }

  function clearLog() {
    logEntries = [];
    const body = document.getElementById('logBody');
    body.innerHTML = '<div class="log-empty" id="logEmpty">Log cleared</div>';
  }

  // ── Auto-scroll ─────────────────────────────────────────────────────────────

  function toggleAutoScroll() {
    autoScroll = !autoScroll;
    const btn = document.getElementById('autoScrollBtn');
    btn.style.color = autoScroll ? 'var(--accent)' : '';
    if (autoScroll) {
      const body = document.getElementById('logBody');
      body.scrollTop = body.scrollHeight;
    }
  }

  // Pause auto-scroll when user scrolls up
  document.addEventListener('DOMContentLoaded', () => {
    const body = document.getElementById('logBody');
    body.addEventListener('scroll', () => {
      const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
      if (!atBottom && autoScroll) {
        autoScroll = false;
        document.getElementById('autoScrollBtn').style.color = '';
      }
    });
  });

  // ── Helpers ─────────────────────────────────────────────────────────────────

  function getVal(id) { return document.getElementById(id)?.value ?? ''; }
  function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = v; }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
